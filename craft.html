<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SImps Craft · SImps TTRPG Wiki</title>
  <link rel="stylesheet" href="./assets/styles.css">
  <style>
    body { overflow: hidden; }
    .craft-wrap { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .craft-sidebar {
      width: 260px; flex-shrink: 0;
      display: flex; flex-direction: column;
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow: hidden;
    }
    .craft-sidebar-head {
      padding: .85rem 1rem .65rem;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .craft-sidebar-head a {
      font-size: .78rem; color: var(--muted); display: block; margin-bottom: .5rem;
    }
    .craft-sidebar-head a:hover { color: var(--accent); text-decoration: none; }
    .craft-sidebar-head h2 {
      font-family: 'Cinzel', serif;
      color: var(--gold-bright);
      margin: 0 0 .15rem;
      font-size: 1.05rem;
      text-shadow: 0 0 12px var(--gold-glow);
    }
    .craft-sidebar-head small { color: var(--muted); font-size: .78rem; }

    .api-row {
      padding: .6rem 1rem;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .api-row label { display: block; font-size: .72rem; color: var(--muted); margin-bottom: .3rem; }
    .api-input {
      width: 100%; padding: .38rem .6rem;
      background: var(--bg-elev-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      color: var(--text); font-size: .8rem;
    }
    .api-input:focus { outline: none; border-color: var(--accent); }

    .elem-count {
      padding: .4rem 1rem;
      font-size: .72rem; color: var(--muted);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .elem-search-wrap { padding: .5rem .75rem .25rem; flex-shrink: 0; }
    .elem-search {
      width: 100%; padding: .38rem .6rem;
      background: var(--bg-elev-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      color: var(--text); font-size: .8rem;
    }
    .elem-search:focus { outline: none; border-color: var(--accent); }

    .elem-list {
      flex: 1; overflow-y: auto; padding: .5rem .65rem;
      display: flex; flex-direction: column; gap: .35rem;
    }
    .elem-pill {
      display: flex; align-items: center; gap: .5rem;
      padding: .38rem .7rem;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: 100px;
      cursor: pointer; font-size: .82rem;
      user-select: none;
      transition: background .12s, border-color .12s, transform .1s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .elem-pill:hover { background: var(--bg-elev-2); border-color: var(--accent); transform: translateX(2px); }
    .elem-pill.is-new { border-color: var(--gold-bright); }
    @keyframes pulse-gold {
      0%   { box-shadow: 0 0 0 0 var(--gold-glow); }
      100% { box-shadow: 0 0 0 8px transparent; }
    }
    .elem-pill.flash { animation: pulse-gold .9s ease-out; }

    .sidebar-actions {
      padding: .5rem .75rem;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }
    .reset-btn {
      width: 100%; padding: .38rem; font-size: .78rem;
      background: transparent; border: 1px solid var(--line);
      border-radius: var(--radius-sm); color: var(--muted); cursor: pointer;
    }
    .reset-btn:hover { border-color: #e05c7a; color: #e05c7a; }

    /* ── Canvas ── */
    .craft-canvas {
      flex: 1; position: relative; overflow: hidden;
      background: radial-gradient(ellipse at center, #1a0d28 0%, #0c0818 100%);
    }
    .craft-canvas::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }
    .canvas-hint {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; color: var(--muted); pointer-events: none;
    }
    .canvas-hint h3 {
      font-family: 'Cinzel', serif; font-size: 1.4rem;
      color: rgba(200,149,42,.25); margin: 0 0 .5rem; letter-spacing: .05em;
    }
    .canvas-hint p { font-size: .85rem; margin: 0; opacity: .5; }

    /* ── Canvas elements ── */
    .c-elem {
      position: absolute;
      display: flex; align-items: center; gap: .42rem;
      padding: .42rem .85rem;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: 100px;
      font-size: .85rem;
      cursor: grab;
      user-select: none;
      white-space: nowrap;
      transition: border-color .12s, box-shadow .12s;
      z-index: 1;
    }
    .c-elem:hover { border-color: var(--accent); box-shadow: 0 0 14px rgba(145,184,255,.18); }
    .c-elem.dragging {
      cursor: grabbing;
      border-color: var(--gold-bright);
      box-shadow: 0 0 22px var(--gold-glow);
      z-index: 999; opacity: .92;
    }
    .c-elem.near { border-color: var(--gold-bright); box-shadow: 0 0 16px var(--gold-glow); }
    @keyframes combine-shrink {
      0%   { transform: scale(1); opacity: 1; }
      60%  { transform: scale(1.25); opacity: .6; }
      100% { transform: scale(0); opacity: 0; }
    }
    .c-elem.combining { animation: combine-shrink .38s ease-out forwards; pointer-events: none; }
    @keyframes pop-in {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.12); opacity: 1; }
      100% { transform: scale(1); }
    }
    .c-elem.popping { animation: pop-in .3s cubic-bezier(.175,.885,.32,1.275) forwards; }

    /* ── Status toast ── */
    .craft-toast {
      position: absolute; bottom: 1.4rem; left: 50%; transform: translateX(-50%);
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 100px; padding: .48rem 1.3rem;
      font-size: .82rem; color: var(--muted);
      pointer-events: none;
      transition: opacity .3s, transform .3s;
      opacity: 0; transform: translateX(-50%) translateY(8px);
      white-space: nowrap; z-index: 1000;
    }
    .craft-toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 11px; height: 11px;
      border: 2px solid var(--line); border-top-color: var(--gold-bright);
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: .35rem;
    }
  </style>
</head>
<body data-theme="dark">
<div class="craft-wrap">

  <!-- Sidebar -->
  <aside class="craft-sidebar">
    <div class="craft-sidebar-head">
      <a href="./index.html">← Back to Wiki</a>
      <h2>SImps Craft</h2>
      <small>Drag elements together to combine</small>
    </div>

    <div class="api-row">
      <label for="api-key">Anthropic API Key</label>
      <input type="password" id="api-key" class="api-input" placeholder="sk-ant-…">
    </div>

    <div class="elem-count" id="elem-count">4 elements discovered</div>

    <div class="elem-search-wrap">
      <input type="search" id="elem-search" class="elem-search" placeholder="Filter elements…">
    </div>

    <div class="elem-list" id="elem-list"></div>

    <div class="sidebar-actions">
      <button class="reset-btn" id="reset-btn">Reset all progress</button>
    </div>
  </aside>

  <!-- Canvas -->
  <div class="craft-canvas" id="canvas">
    <div class="canvas-hint" id="canvas-hint">
      <h3>The SImps Forge</h3>
      <p>Click an element on the left to place it,<br>then drag one onto another to combine.</p>
    </div>
  </div>

  <div class="craft-toast" id="toast"></div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const STARTING = [
  { name: 'Simp',  emoji: '🧍' },
  { name: 'Power', emoji: '⚡' },
  { name: 'Crime', emoji: '🔫' },
  { name: 'Magic', emoji: '✨' },
];

const SYSTEM_PROMPT = `You are the combination oracle for the SImps TTRPG — a wildly creative tabletop RPG universe with power-ranked beings, crime gangs, time machines, metaverse variants, arenas, and total chaotic energy.

The universe contains: Jimmy Strong, Terry Davis, God/Dios, The Sun God, Detective Steven, Terragirl, Master of Instruments, Glow Baby, Anthropomorphic Oklahoma, Gigadragon, God of War, The King (Who Must Be Pleased), Tony Stony, Elizabeth, Lizzie, Chichibongo, Tiny Stony, The Mighty Duck, Rabby the Rabbit, Soviet Matt with Nuke, Bort, Gigashark, Ahmad Punching Joy to Death, Lord Fertittle, Emo Fist Superhero, Bob the Ghost Kid, Warden, Octopus Lie Detector, Lamppost Vampire Hunter, Medusa, Tommy the Rattlesnake, Queen Grandmother Mother Frog, Mr Awesome Rodriguez, Christmas Genie Twins, Giant Wheat Germ, Gibberish Radish, Battletoad, GTA Protag, Giant Snake Slasher, Chompy the Giant Alligator, Bessie the Cow (mind enslaving milk), Big Giorno, Negative $20 Genie, Bloogorf, 5000 Zombie Chickens, Time Wizard John, Robo Host, Mother Barron, Barroness, Barron, Ambi the Ambulance, Angel Sarah, Crime City, Apple Police, Doodle Squad, Orb People, Roger's Time Machine, SImps Car, SImps Lights, The Fucktree, Horror Lamp, Scream Flower, Cage Wolf, Zoom Bear, Balloon Sensei, Acid Breath Baby, Fairy Godmother, Book Demon, Chicken Nugget Spies, Servebot, Detective Marcel, Santa Claus Uber Driver, Maitress Binda, Pumpkin Sam, and many more.

When two elements are combined, respond with EXACTLY this format and nothing else:
EMOJI|Result Name

Rules:
- Result Name: 1–5 words, no trailing punctuation
- EMOJI: one fitting emoji
- Lean toward SImps universe entities when the combination suggests one
- Otherwise invent something in the same absurdist spirit
- ONLY output EMOJI|Name — zero explanation, zero extra text`;

// ── State ─────────────────────────────────────────────────────────────────────
let elements = new Map();  // name → { name, emoji, isNew }
let cache = {};            // 'A|||B' → [emoji, name]
let canvasItems = [];      // { id, name, emoji, x, y, el }
let nextId = 0;
let busy = false;

// ── Storage ───────────────────────────────────────────────────────────────────
function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem('simps-craft-v1') || '{}');
    cache = raw.cache || {};
    const saved = raw.elements || STARTING;
    saved.forEach(e => elements.set(e.name, { name: e.name, emoji: e.emoji, isNew: false }));
  } catch {
    STARTING.forEach(e => elements.set(e.name, { ...e, isNew: false }));
  }
  const key = localStorage.getItem('simps-craft-key') || '';
  document.getElementById('api-key').value = key;
}

function saveState() {
  localStorage.setItem('simps-craft-v1', JSON.stringify({
    cache,
    elements: [...elements.values()].map(({ name, emoji }) => ({ name, emoji })),
  }));
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar(filter = '') {
  const list = document.getElementById('elem-list');
  const count = document.getElementById('elem-count');
  const lf = filter.toLowerCase();
  count.textContent = `${elements.size} element${elements.size !== 1 ? 's' : ''} discovered`;
  list.innerHTML = '';
  [...elements.values()]
    .filter(e => !lf || e.name.toLowerCase().includes(lf))
    .sort((a, b) => a.name.localeCompare(b.name))
    .forEach(e => {
      const pill = document.createElement('div');
      pill.className = 'elem-pill' + (e.isNew ? ' is-new' : '');
      pill.innerHTML = `<span>${e.emoji}</span><span title="${e.name}">${e.name}</span>`;
      pill.title = `Click to place "${e.name}" on canvas`;
      pill.addEventListener('click', () => spawnElem(e));
      list.appendChild(pill);
      if (e.isNew) { requestAnimationFrame(() => pill.classList.add('flash')); }
    });
}

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const hint   = document.getElementById('canvas-hint');

function spawnElem(elem, x, y) {
  const rect = canvas.getBoundingClientRect();
  if (x === undefined) {
    x = 60 + Math.random() * (rect.width - 220);
    y = 60 + Math.random() * (rect.height - 160);
  }
  const id = nextId++;
  const el = document.createElement('div');
  el.className = 'c-elem';
  el.innerHTML = `<span>${elem.emoji}</span><span>${elem.name}</span>`;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  canvas.appendChild(el);
  const item = { id, name: elem.name, emoji: elem.emoji, x, y, el };
  canvasItems.push(item);
  makeDraggable(el, item);
  hint.style.display = 'none';
  return item;
}

function removeItem(item) {
  item.el.remove();
  canvasItems = canvasItems.filter(i => i.id !== item.id);
  if (canvasItems.length === 0) hint.style.display = '';
}

// ── Drag ──────────────────────────────────────────────────────────────────────
let dragging = null, offX = 0, offY = 0, prevNear = null;

function makeDraggable(el, item) {
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    offX = e.clientX - r.left - item.x;
    offY = e.clientY - r.top  - item.y;
    dragging = item;
    el.classList.add('dragging');
    el.style.zIndex = 999;
  });
}

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const r = canvas.getBoundingClientRect();
  dragging.x = e.clientX - r.left - offX;
  dragging.y = e.clientY - r.top  - offY;
  dragging.el.style.left = dragging.x + 'px';
  dragging.el.style.top  = dragging.y + 'px';

  // Highlight nearest target
  const near = canvasItems.find(o => o.id !== dragging.id && dist(o, dragging) < 80);
  if (near !== prevNear) {
    if (prevNear) prevNear.el.classList.remove('near');
    if (near)     near.el.classList.add('near');
    prevNear = near || null;
  }
});

document.addEventListener('mouseup', async () => {
  if (!dragging) return;
  const dropped = dragging;
  dragging = null;
  dropped.el.classList.remove('dragging');
  dropped.el.style.zIndex = 1;
  if (prevNear) { prevNear.el.classList.remove('near'); prevNear = null; }

  const target = canvasItems.find(o => o.id !== dropped.id && dist(o, dropped) < 80);
  if (target) await combine(dropped, target);
});

function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

// ── Combining ─────────────────────────────────────────────────────────────────
async function combine(a, b) {
  if (busy) return;
  busy = true;

  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) {
    showToast('Enter your Anthropic API key in the sidebar first.');
    busy = false; return;
  }

  const midX = (a.x + b.x) / 2;
  const midY = (a.y + b.y) / 2;

  a.el.classList.add('combining');
  b.el.classList.add('combining');
  showToast('<span class="spinner"></span>Combining…');

  await wait(380);
  removeItem(a);
  removeItem(b);

  try {
    const [emoji, name] = await getCombination(a.name, b.name, apiKey);
    const isNew = !elements.has(name);
    elements.set(name, { name, emoji, isNew });
    saveState();
    renderSidebar(document.getElementById('elem-search').value);

    await wait(60);
    const item = spawnElem({ name, emoji }, midX, midY);
    item.el.classList.add('popping');
    showToast(isNew ? `✨ New discovery: ${emoji} ${name}!` : `${emoji} ${name}`);
  } catch (err) {
    showToast('Error: ' + err.message);
  } finally {
    busy = false;
  }
}

async function getCombination(nameA, nameB, apiKey) {
  const key = [nameA, nameB].sort().join('|||');
  if (cache[key]) return cache[key];

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 40,
      system: SYSTEM_PROMPT,
      messages: [{ role: 'user', content: `${nameA} + ${nameB}` }],
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const text = (data.content?.[0]?.text || '').trim();
  const parts = text.split('|');
  let emoji = '✨', name = text;
  if (parts.length >= 2) {
    emoji = parts[0].trim() || '✨';
    name  = parts.slice(1).join('|').trim();
  }
  if (!name) name = text || 'Unknown';

  const result = [emoji, name];
  cache[key] = result;
  saveState();
  return result;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
const toast = document.getElementById('toast');
function showToast(html) {
  toast.innerHTML = html;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('api-key').addEventListener('change', e => {
  localStorage.setItem('simps-craft-key', e.target.value.trim());
});
document.getElementById('elem-search').addEventListener('input', e => {
  renderSidebar(e.target.value);
});
document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('Reset all progress and discovered elements?')) return;
  elements.clear();
  cache = {};
  canvasItems.forEach(i => i.el.remove());
  canvasItems = [];
  hint.style.display = '';
  STARTING.forEach(e => elements.set(e.name, { ...e, isNew: false }));
  saveState();
  renderSidebar();
  showToast('Progress reset. Four elements remain.');
});

loadState();
renderSidebar();
</script>
</body>
</html>
